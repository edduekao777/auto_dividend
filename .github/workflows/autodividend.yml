# 設定觸發條件
on:
  # 1. 排程觸發：台灣時間每週一早上 09:00 觸發（UTC 時間週一 01:00）
  schedule:
    - cron: '0 1 * * 1'  # 這裡代表每天 UTC 01:00（台灣時間早上 09:00）自動執行
  
  # 2. 手動觸發：允許你隨時到 GitHub 網頁上點擊按鈕手動執行
  workflow_dispatch: 

jobs:
  execute-api:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 虛擬環境執行

    steps:
    - name: Send POST Request to Serv00
      run: |
        curl -X POST https://develop1.serv00.net/dbService.php \
          -H "Content-Type: application/x-www-form-urlencoded" \
           -b "app_userID=woandy1" \
          -d "action=setDividendPolicy" \
          --fail \
          --verbose
